<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <title>Réinitialisation du mot de passe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-row h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #333;
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      height: 50px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 1rem;
      background: #fafafa;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #007AFF; background: #fff; }
    button {
      width: 100%;
      height: 50px;
      background: #007AFF;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .msg.error { background: #fff0f0; color: #d00; border: 1px solid #fcc; }
    .msg.success { background: #f0fff4; color: #0a0; border: 1px solid #9e9; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-state {
      text-align: center;
      color: #666;
      padding: 20px 0;
    }
    #loading-state .spinner {
      display: inline-block;
      border-color: rgba(0,122,255,0.3);
      border-top-color: #007AFF;
      margin-bottom: 12px;
    }
    #form-state, #success-state { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <h1 id="app-name"></h1>
    </div>

    <!-- État : chargement / vérification du code -->
    <div id="loading-state">
      <div class="spinner"></div>
      <p>Vérification du lien…</p>
    </div>

    <!-- État : formulaire -->
    <div id="form-state">
      <h2>Nouveau mot de passe</h2>
      <p class="subtitle">Choisissez un nouveau mot de passe pour votre compte.</p>

      <label for="password">Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="Au moins 6 caractères" autocomplete="new-password" />

      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="Répétez le mot de passe" autocomplete="new-password" />

      <button id="submit-btn" type="button">
        <span id="btn-label">Mettre à jour</span>
        <div id="btn-spinner" class="spinner"></div>
      </button>

      <div id="msg" class="msg"></div>
    </div>

    <!-- État : succès -->
    <div id="success-state">
      <h2>Mot de passe mis à jour ✓</h2>
      <p class="subtitle" style="margin-top:12px">
        Votre mot de passe a été changé avec succès.<br/>
        Vous pouvez fermer cette page et vous connecter dans l'application.
      </p>
      <!-- href="/login" assumes same-origin deploy: universal-links-site served at app origin (e.g. app.lepassant.app) -->
      <a href="/login" style="display:inline-block;margin-top:16px;color:#007AFF;font-weight:600;text-decoration:none;">Se connecter</a>
    </div>
  </div>

  <!-- Error params handled first — app-config.js needed for app name in error state -->
  <script src="/app-config.js"></script>
  <script>
    (function() {
      var appName = (window.__APP_CONFIG__ && window.__APP_CONFIG__.appName) || 'App';
      var searchParams = new URLSearchParams(window.location.search);
      var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var errorCode = searchParams.get('error_code') || hashParams.get('error_code');
      var errorDesc = searchParams.get('error_description') || hashParams.get('error_description');
      if (searchParams.get('error') || hashParams.get('error') || errorCode) {
        var msg = errorCode === 'otp_expired'
          ? "Ce lien de réinitialisation a expiré. Veuillez demander un nouveau lien."
          : (errorDesc ? decodeURIComponent(String(errorDesc).replace(/\+/g, ' ')) : "Lien invalide ou expiré. Veuillez demander un nouveau lien.");
        document.body.innerHTML = '<div class="card"><div class="logo-row"><h1>' + appName + '</h1></div><h2>Lien invalide</h2><p class="subtitle">' + msg + '</p><a href="/login" style="display:inline-block;margin-top:16px;color:#007AFF;font-weight:600;text-decoration:none;">Retour à la connexion</a></div>';
        window.__RESET_PASSWORD_ERROR_SHOWN = true;
        return;
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/app-config.js"></script>
  <script src="config.js"></script>
  <script>
    if (window.__RESET_PASSWORD_ERROR_SHOWN) { /* already shown by early script */ } else {
    const cfg = window.__SUPABASE_CONFIG__;
    if (!cfg?.url || !cfg?.anonKey) {
      document.body.innerHTML = '<div class="card"><p class="msg error">Configuration manquante. Vérifiez que config.js existe et définit __SUPABASE_CONFIG__ (url, anonKey).</p></div>';
    } else {
      const appName = cfg.appName || (window.__APP_CONFIG__ && window.__APP_CONFIG__.appName) || 'App';
      document.title = 'Réinitialisation du mot de passe – ' + appName;
      const h1 = document.getElementById('app-name');
      if (h1) h1.textContent = appName;

      // flowType: 'implicit' matches getResetPasswordClient() on the app side.
      // Tokens arrive in the URL hash (#access_token=...&type=recovery) — no code_verifier needed.
      const client = supabase.createClient(cfg.url, cfg.anonKey, {
        auth: { flowType: 'implicit' },
      });

      function show(id) {
      ['loading-state', 'form-state', 'success-state'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function init() {

      // --- Implicit flow: tokens arrive in the URL hash ---
      // e.g. #access_token=xxx&type=recovery&refresh_token=yyy
      const hash = new URLSearchParams(window.location.hash.substring(1));
      const accessToken  = hash.get('access_token');
      const refreshToken = hash.get('refresh_token');
      const type         = hash.get('type');

      if (accessToken && type === 'recovery') {
        const { error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken ?? '',
        });
        if (error) {
          show('form-state');
          showMsg("Ce lien est invalide ou a expiré. Veuillez demander un nouveau lien.", 'error');
          document.getElementById('submit-btn').disabled = true;
          return;
        }
        show('form-state');
        return;
      }

      // No token found
      show('form-state');
      showMsg("Lien invalide ou expiré. Veuillez demander un nouveau lien de réinitialisation.", 'error');
      document.getElementById('submit-btn').disabled = true;
    }

    async function handleSubmit() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      // Keep in sync with Supabase Auth → Password → Minimum password length (currently 6).
      if (password.length < 6) {
        showMsg("Le mot de passe doit contenir au moins 6 caractères.", 'error');
        return;
      }
      if (password !== confirm) {
        showMsg("Les mots de passe ne correspondent pas.", 'error');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      document.getElementById('btn-label').style.display = 'none';
      document.getElementById('btn-spinner').style.display = 'block';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        btn.disabled = false;
        document.getElementById('btn-label').style.display = 'block';
        document.getElementById('btn-spinner').style.display = 'none';
        showMsg(error.message, 'error');
        return;
      }

      show('success-state');
    }

      document.getElementById('submit-btn').addEventListener('click', handleSubmit);
      init();
    }
    }
  </script>
</body>
</html>
